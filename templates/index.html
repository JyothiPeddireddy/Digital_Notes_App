<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Notebook</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Dark theme (default) ── */
    :root {
      --bg:       #0f0f11;
      --surface:  #17171a;
      --surface2: #1e1e23;
      --border:   #2a2a32;
      --accent:   #7c6aff;
      --accent2:  #a78bfa;
      --green:    #34d399;
      --red:      #f87171;
      --text:     #e2e2f0;
      --muted:    #6b6b80;
      --radius:   10px;
    }

    /* ── Light theme ── */
    [data-theme="light"] {
      --bg:       #f5f5f8;
      --surface:  #ffffff;
      --surface2: #ededf2;
      --border:   #d8d8e0;
      --accent:   #7c6aff;
      --accent2:  #6355e0;
      --green:    #059669;
      --red:      #dc2626;
      --text:     #1a1a2e;
      --muted:    #7070a0;
      --radius:   10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.25s, color 0.25s;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent2);
    }
    .logo span { color: var(--muted); font-weight: 400; }
    .badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 0.68rem;
      color: var(--green);
      font-family: 'IBM Plex Mono', monospace;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .badge::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      display: inline-block;
    }
    .header-right { display: flex; align-items: center; gap: 14px; }
    #header-time {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
    }

    /* ── Theme toggle ── */
    .theme-toggle {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 2px;
      transition: background 0.2s;
    }
    .toggle-opt {
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      transition: all 0.2s;
      color: var(--muted);
      user-select: none;
      font-family: 'IBM Plex Mono', monospace;
    }
    .toggle-opt.on {
      background: var(--accent);
      color: #fff;
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 290px 1fr;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 57px);
    }

    /* ── Sidebar ── */
    .sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface);
    }
    .sidebar-top {
      padding: 16px 16px 10px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .sidebar-top-row h2 {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
    }
    #note-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 999px;
      color: var(--accent);
    }
    #search {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 0.82rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }

    #notes-list { overflow-y: auto; flex: 1; padding: 8px; }

    .note-item {
      padding: 12px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
      margin-bottom: 3px;
    }
    .note-item:hover { background: var(--surface2); }
    .note-item.active { background: var(--surface2); border-color: var(--accent); }
    .note-item-title {
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .note-item-preview {
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .note-item-time {
      font-size: 0.65rem;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
    }
    .empty-list {
      text-align: center;
      padding: 48px 16px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.8;
    }
    .empty-list .empty-icon { font-size: 2rem; margin-bottom: 8px; }

    /* ── Main ── */
    main { display: flex; flex-direction: column; overflow: hidden; }

    .toolbar {
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
      background: var(--surface);
    }
    .toolbar-right { margin-left: auto; display: flex; gap: 8px; }

    .btn {
      padding: 7px 16px;
      border-radius: 7px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #6a58f0; }
    .btn-ghost    { background: transparent; color: var(--text); border-color: var(--border); }
    .btn-ghost:hover { background: var(--surface2); }
    .btn-danger   { background: transparent; color: var(--red); border-color: var(--border); }
    .btn-danger:hover { background: var(--surface2); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Panel ── */
    .panel { flex: 1; overflow-y: auto; padding: 36px 44px; }

    .welcome {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
    }
    .welcome .icon { font-size: 3.5rem; margin-bottom: 8px; }
    .welcome h3 { color: var(--text); font-size: 1.1rem; font-weight: 500; }
    .welcome p { font-size: 0.82rem; }
    .welcome .hint {
      margin-top: 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.75rem;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--muted);
    }

    /* Form */
    .form-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 28px; }
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    input[type="text"], textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.25s;
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
    .char-count { font-size: 0.68rem; color: var(--muted); text-align: right; margin-top: 4px; font-family: 'IBM Plex Mono', monospace; }
    .char-count.warn { color: var(--red); }
    textarea { resize: vertical; min-height: 240px; line-height: 1.7; }
    .form-actions { display: flex; gap: 10px; }

    /* Note view */
    .note-view-header { margin-bottom: 24px; }
    .note-view-title  { font-size: 1.7rem; font-weight: 600; line-height: 1.3; margin-bottom: 8px; }
    .note-view-meta   {
      font-size: 0.72rem;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .meta-tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.65rem;
    }
    .note-view-content {
      font-size: 0.95rem;
      line-height: 1.85;
      color: var(--muted);
      white-space: pre-wrap;
      margin-top: 24px;
    }

    /* ── Saved note boxes (title + content display) ── */
    .note-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-top: 16px;
      transition: background 0.25s;
    }
    .note-box-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--accent);
      margin-bottom: 8px;
      font-family: 'IBM Plex Mono', monospace;
    }
    .note-box-value {
      font-size: 0.95rem;
      color: var(--text);
      line-height: 1.7;
      white-space: pre-wrap;
    }
    .note-box-value.title-value {
      font-size: 1.5rem;
      font-weight: 600;
      line-height: 1.3;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 28px; right: 28px;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 500;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.25s ease;
      pointer-events: none;
      z-index: 999;
      max-width: 320px;
      border: 1px solid transparent;
    }
    #toast.show    { opacity: 1; transform: translateY(0); }
    #toast.success { background: #0d2e22; color: var(--green); border-color: #1a4a35; }
    #toast.error   { background: #2e0d0d; color: var(--red);   border-color: #4a1a1a; }
    [data-theme="light"] #toast.success { background: #ecfdf5; border-color: #6ee7b7; }
    [data-theme="light"] #toast.error   { background: #fef2f2; border-color: #fca5a5; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px;
      width: 380px;
      text-align: center;
    }
    .modal-icon { font-size: 2rem; margin-bottom: 12px; }
    .modal h3   { margin-bottom: 8px; font-size: 1rem; }
    .modal p    { color: var(--muted); font-size: 0.83rem; margin-bottom: 24px; line-height: 1.6; }
    .modal-btns { display: flex; gap: 10px; justify-content: center; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">My <span>Notebook</span></div>
    <div class="badge">SQLite</div>
  </div>
  <div class="header-right">
    <div id="header-time"></div>
    <!-- Theme Toggle -->
    <div class="theme-toggle" onclick="toggleTheme()">
      <div class="toggle-opt" id="opt-dark">🌙 Dark</div>
      <div class="toggle-opt" id="opt-light">☀️ Light</div>
    </div>
  </div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-top-row">
        <h2>All Notes</h2>
        <span id="note-count">0</span>
      </div>
      <input type="text" id="search" placeholder="🔍  Search notes…" oninput="handleSearch()" />
    </div>
    <div id="notes-list"></div>
  </aside>

  <!-- Main -->
  <main>
    <div class="toolbar">
      <button class="btn btn-primary" onclick="showCreateForm()">＋ New Note</button>
      <div class="toolbar-right">
        <button class="btn btn-ghost"  id="btn-edit"   onclick="showEditForm()"  disabled>✏️ Edit</button>
        <button class="btn btn-danger" id="btn-delete" onclick="confirmDelete()" disabled>🗑 Delete</button>
      </div>
    </div>
    <div class="panel" id="panel">
      <div class="welcome">
        <div class="icon">📒</div>
        <h3>Welcome to My Notebook</h3>
        <p>Select a note from the sidebar or create a new one.</p>
        <div class="hint">Tip: Use the search bar to find notes instantly</div>
      </div>
    </div>
  </main>
</div>

<!-- Delete Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-icon">🗑️</div>
    <h3>Delete this note?</h3>
    <p id="modal-msg">This action cannot be undone.</p>
    <div class="modal-btns">
      <button class="btn btn-ghost"  onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="executeDelete()">Yes, Delete</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  let allNotes   = [];
  let activeNote = null;
  let searchTimer = null;

  // ── Theme toggle ──
  let currentTheme = localStorage.getItem("nb-theme") || "dark";

  function applyTheme(theme) {
    currentTheme = theme;
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("nb-theme", theme);
    document.getElementById("opt-dark").classList.toggle("on",  theme === "dark");
    document.getElementById("opt-light").classList.toggle("on", theme === "light");
  }

  function toggleTheme() {
    applyTheme(currentTheme === "dark" ? "light" : "dark");
  }

  applyTheme(currentTheme);   // apply on load

  // ── Clock ──
  function updateClock() {
    const now = new Date();
    document.getElementById("header-time").textContent =
      now.toLocaleDateString("en-IN", { weekday:"short", day:"2-digit", month:"short" }) +
      "  " + now.toLocaleTimeString("en-IN", { hour:"2-digit", minute:"2-digit" });
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── Toast ──
  function showToast(msg, type = "success") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => t.className = "", 3000);
  }

  // ── Load all notes ──
  async function loadNotes() {
    const res = await fetch("/api/notes");
    allNotes  = await res.json();
    renderList(allNotes);
  }

  // ── Render sidebar ──
  function renderList(notes) {
    const container = document.getElementById("notes-list");
    document.getElementById("note-count").textContent = notes.length;
    if (!notes.length) {
      container.innerHTML = `
        <div class="empty-list">
          <div class="empty-icon">🗒️</div>
          No notes found.<br/>Create one to get started.
        </div>`;
      return;
    }
    container.innerHTML = notes.map(n => `
      <div class="note-item ${activeNote && activeNote.id === n.id ? 'active' : ''}"
           onclick="viewNote(${n.id})">
        <div class="note-item-title">${escHtml(n.title)}</div>
        <div class="note-item-preview">${escHtml(n.content.substring(0, 60))}…</div>
        <div class="note-item-time">${n.timestamp}</div>
      </div>
    `).join('');
  }

  // ── Search ──
  function handleSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      const q = document.getElementById("search").value.toLowerCase().trim();
      if (!q) { renderList(allNotes); return; }
      renderList(allNotes.filter(n =>
        n.title.toLowerCase().includes(q) || n.content.toLowerCase().includes(q)
      ));
    }, 200);
  }

  // ── View note — shows title box + content box separately ──
  async function viewNote(id) {
    const res = await fetch(`/api/notes/${id}`);
    if (!res.ok) { showToast("Note not found.", "error"); return; }
    activeNote = await res.json();
    renderList(allNotes.filter(n => {
      const q = document.getElementById("search").value.toLowerCase();
      return !q || n.title.toLowerCase().includes(q) || n.content.toLowerCase().includes(q);
    }));
    document.getElementById("btn-edit").disabled   = false;
    document.getElementById("btn-delete").disabled = false;
    document.getElementById("panel").innerHTML = `
      <div class="note-view-meta">
        <span>🕐 ${activeNote.timestamp}</span>
        <span class="meta-tag">ID #${activeNote.id}</span>
      </div>

      <!-- Title Box -->
      <div class="note-box">
        <div class="note-box-label">📌 Title</div>
        <div class="note-box-value title-value">${escHtml(activeNote.title)}</div>
      </div>

      <!-- Content Box -->
      <div class="note-box">
        <div class="note-box-label">📝 Content</div>
        <div class="note-box-value">${escHtml(activeNote.content)}</div>
      </div>
    `;
  }

  // ── Create form ──
  function showCreateForm() {
    activeNote = null;
    document.getElementById("btn-edit").disabled   = true;
    document.getElementById("btn-delete").disabled = true;
    renderList(allNotes);
    document.getElementById("panel").innerHTML = `
      <div class="form-title">✏️ New Note</div>
      <div class="form-group">
        <label>Title <span style="color:var(--red)">*</span></label>
        <input type="text" id="f-title" placeholder="Enter a unique title…" maxlength="100"
               oninput="updateCharCount('f-title','title-count',100)" />
        <div class="char-count" id="title-count">0 / 100</div>
      </div>
      <div class="form-group">
        <label>Content <span style="color:var(--red)">*</span></label>
        <textarea id="f-content" placeholder="Write your note here…"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="submitCreate()">💾 Save Note</button>
        <button class="btn btn-ghost"   onclick="resetPanel()">Cancel</button>
      </div>
    `;
    document.getElementById("f-title").focus();
  }

  function updateCharCount(inputId, countId, max) {
    const len = document.getElementById(inputId).value.length;
    const el  = document.getElementById(countId);
    el.textContent = `${len} / ${max}`;
    el.className   = `char-count${len > max * 0.9 ? ' warn' : ''}`;
  }

  async function submitCreate() {
    const title   = document.getElementById("f-title").value.trim();
    const content = document.getElementById("f-content").value.trim();
    if (!title || !content) { showToast("Title and content are required.", "error"); return; }
    const res  = await fetch("/api/notes", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, content })
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error, "error"); return; }
    showToast(data.message);
    await loadNotes();
    viewNote(data.note.id);
  }

  // ── Edit form ──
  function showEditForm() {
    if (!activeNote) return;
    document.getElementById("panel").innerHTML = `
      <div class="form-title">✏️ Edit: ${escHtml(activeNote.title)}</div>
      <div class="form-group">
        <label>Content <span style="color:var(--red)">*</span></label>
        <textarea id="f-edit-content">${escHtml(activeNote.content)}</textarea>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="submitUpdate()">💾 Save Changes</button>
        <button class="btn btn-ghost"   onclick="viewNote(${activeNote.id})">Cancel</button>
      </div>
    `;
    document.getElementById("f-edit-content").focus();
  }

  async function submitUpdate() {
    const content = document.getElementById("f-edit-content").value.trim();
    if (!content) { showToast("Content cannot be empty.", "error"); return; }
    const res  = await fetch(`/api/notes/${activeNote.id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content })
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error, "error"); return; }
    showToast(data.message);
    await loadNotes();
    viewNote(activeNote.id);
  }

  // ── Delete ──
  function confirmDelete() {
    if (!activeNote) return;
    document.getElementById("modal-msg").textContent =
      `"${activeNote.title}" will be permanently deleted.`;
    document.getElementById("modal").classList.add("show");
  }
  function closeModal() {
    document.getElementById("modal").classList.remove("show");
  }
  async function executeDelete() {
    closeModal();
    const res  = await fetch(`/api/notes/${activeNote.id}`, { method: "DELETE" });
    const data = await res.json();
    if (!res.ok) { showToast(data.error, "error"); return; }
    showToast(data.message);
    activeNote = null;
    document.getElementById("btn-edit").disabled   = true;
    document.getElementById("btn-delete").disabled = true;
    await loadNotes();
    resetPanel();
  }

  function resetPanel() {
    document.getElementById("panel").innerHTML = `
      <div class="welcome">
        <div class="icon">📒</div>
        <h3>Welcome to My Notebook</h3>
        <p>Select a note from the sidebar or create a new one.</p>
        <div class="hint">Tip: Use the search bar to find notes instantly</div>
      </div>`;
  }

  function escHtml(str) {
    return String(str)
